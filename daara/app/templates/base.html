<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Gestion Daara{% endblock %}</title>
  <style>
    :root { color-scheme: light; --ink:#1f2937; --muted:#6b7280; --line:#d1d5db; --bg:#f7f7f8; --brand:#0f766e; --danger:#b91c1c; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: Arial, sans-serif; color:var(--ink); background:var(--bg); }
    nav { background:#ffffff; border-bottom:1px solid var(--line); }
    nav .inner, main, footer { max-width:1180px; margin:0 auto; padding:16px; }
    nav .inner { display:flex; gap:18px; align-items:center; flex-wrap:wrap; }
    nav a { color:var(--ink); text-decoration:none; font-weight:600; }
    nav a.brand { color:var(--brand); font-size:20px; margin-right:12px; }
    h1 { font-size:28px; margin:8px 0 18px; }
    .toolbar { display:flex; gap:10px; align-items:end; justify-content:space-between; flex-wrap:wrap; margin-bottom:16px; }
    .filters { display:flex; gap:10px; flex-wrap:wrap; align-items:end; }
    label { display:block; font-weight:600; margin-bottom:6px; }
    input, select, textarea { width:100%; min-height:38px; padding:8px 10px; border:1px solid var(--line); border-radius:6px; background:#fff; }
    textarea { min-height:110px; }
    .field { margin-bottom:14px; }
    .form-panel { max-width:720px; background:#fff; border:1px solid var(--line); border-radius:8px; padding:18px; }
    .errors { color:var(--danger); margin:6px 0 0; font-size:14px; }
    button, .btn { display:inline-flex; align-items:center; justify-content:center; min-height:38px; border:1px solid var(--line); border-radius:6px; padding:8px 12px; background:#fff; color:var(--ink); text-decoration:none; cursor:pointer; font-weight:600; }
    .primary { background:var(--brand); color:#fff; border-color:var(--brand); }
    .danger { color:var(--danger); }
    .actions { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .inline { display:inline; }
    table { width:100%; border-collapse:collapse; background:#fff; border:1px solid var(--line); }
    th, td { padding:10px 12px; border-bottom:1px solid var(--line); text-align:left; vertical-align:top; }
    th { background:#f0fdfa; }
    .flash { padding:10px 12px; border-radius:6px; margin-bottom:10px; background:#e0f2fe; }
    .flash.success { background:#dcfce7; }
    .flash.danger { background:#fee2e2; }
    footer { color:var(--muted); font-size:14px; }
  </style>
</head>
<body>
  <nav>
    <div class="inner">
      <a class="brand" href="{{ url_for('main.accueil') }}">Daara</a>
      <a href="{{ url_for('maitres.lister') }}">Maîtres</a>
      <a href="{{ url_for('classes.lister') }}">Classes</a>
      <a href="{{ url_for('talibes.lister') }}">Talibés</a>
      <a href="{{ url_for('progressions.lister') }}">Progressions</a>
    </div>
  </nav>
  <main>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
  <footer>ISI - Licence 2 Génie Logiciel</footer>
</body>
</html>
